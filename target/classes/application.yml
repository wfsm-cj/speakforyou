server:
  port: 8080

spring:
  application:
    name: speak-for-you-backend
  datasource:
    url: jdbc:mysql://localhost:3306/speak_for_you?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root1234
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: replace-with-your-very-long-secret-key-32-chars-minimum
    expiration: 86400000
  dashscope:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    default-model: qwen-plus
    # 可选：系统公共 Key。为空时，用户未配置个人 Key 将走本地兜底回复。
    system-api-key: ${DASHSCOPE_API_KEY:}
  pgvector:
    host: localhost
    port: 5432
    database: speak_for_you_vector
    user: postgres
    password: root1234
    table: speech_embeddings
    dimension: 1024
  rate-limit:
    max-requests-per-day: 30
